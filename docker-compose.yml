services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - store

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    networks:
      - store

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345678
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_data:/data
    networks:
      - store

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    networks:
      - store
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for i in $$(seq 1 30); do
          mc alias set local http://minio:9000 minio minio12345678 && break
          sleep 1
        done
        mc mb local/medusa --ignore-existing
        mc anonymous set download local/medusa
    restart: "no"

volumes:
  postgres_data:
  minio_data:

networks:
  store:
    driver: bridge
  traefik:
    external: true
    name: traefik
